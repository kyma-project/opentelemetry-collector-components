name: Build Image

permissions:
  contents: read

on:
  workflow_run:
    workflows: ["Extract Versions"]
    types: [completed]
  push:
    branches:
      - "main"
      - "release-*"
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "OWNERS"
      - "CODEOWNERS"

jobs:
  envs:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      build-args: ${{ steps.prepare-envs.outputs.build-args }}
      tags: ${{ steps.create-tags.outputs.tags }}
      otel-version: ${{ steps.load-envs.outputs.OTEL_VERSION }}
      otel-contrib-version: ${{ steps.load-envs.outputs.OTEL_CONTRIB_VERSION }}

    steps:
      - name: Checkout code
        if: github.event_name == 'push'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download versions artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: pr-versions
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: /tmp

      - name: Load envs from artifact (PR)
        if: github.event_name == 'workflow_run'
        id: load-artifact-envs
        run: |
          # Re-validate after download — defense in depth
          grep -E '^OTEL_(CONTRIB_)?VERSION=[0-9]+\.[0-9]+\.[0-9]+$' /tmp/versions.env > /tmp/validated.env
          grep -E '^PR_NUMBER=[0-9]+$' /tmp/versions.env >> /tmp/validated.env
          cp /tmp/validated.env otel-collector/envs

      - name: prepare envs
        id: prepare-envs
        run: |
          {
          echo 'build-args<<BUILD_ARGS'
          grep -E '^OTEL_(CONTRIB_)?VERSION=' otel-collector/envs
          echo BUILD_ARGS
          } >> "$GITHUB_OUTPUT"

      - name: load envs into output
        id: load-envs
        run: |
          grep -E '^OTEL_(CONTRIB_)?VERSION=' otel-collector/envs >> "$GITHUB_OUTPUT"

      - name: load PR number
        id: load-pr-number
        if: github.event_name == 'workflow_run'
        run: |
          echo "PR_NUMBER=$(grep -E '^PR_NUMBER=' /tmp/validated.env | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: create tags
        id: create-tags
        run: |
          if [[ $GITHUB_EVENT_NAME == 'push' || $GITHUB_EVENT_NAME == 'merge_group' ]]; then
            {
              echo "tags<<EOTAGS"
              echo "${{ github.ref_name }}"
              echo "${{ steps.load-envs.outputs.OTEL_VERSION }}-${{ github.ref_name }}"
              echo "EOTAGS"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tags<<EOTAGS"
              echo "PR-${{ steps.load-pr-number.outputs.PR_NUMBER }}"
              echo "EOTAGS"
            } >> "$GITHUB_OUTPUT"
          fi

  build-image:
    permissions:
      id-token: write # Required for requesting the JWT token
      contents: read
    needs: envs
    uses: kyma-project/test-infra/.github/workflows/image-builder.yml@main # Usage: kyma-project/test-infra/.github/workflows/image-builder.yml@main
    with:
      name: kyma-otel-collector
      dockerfile: otel-collector/Dockerfile
      context: .
      build-args: ${{ needs.envs.outputs.build-args }}
      tags: ${{ needs.envs.outputs.tags }}
      platforms: "linux/amd64,linux/arm64"

  list-images:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: List images
        run: |
          echo "${{ needs.build-image.outputs.images }}"
